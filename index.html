<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E2EE Chat Client v0.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-8">
    <div class="max-w-6xl mx-auto grid grid-cols-12 gap-6">
        
        <div class="col-span-4 space-y-4">
            <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
                <h2 class="text-xl font-bold mb-4">1. Register / Login</h2>
                <input id="aliasInput" type="text" placeholder="Username (alias)" class="w-full bg-slate-900 p-2 rounded border border-slate-600 mb-2">
                <button onclick="handleAuth()" class="w-full bg-blue-600 hover:bg-blue-500 py-2 rounded font-bold">Initialize Identity</button>
                <p id="status" class="mt-2 text-xs text-slate-400"></p>
            </div>

            <div class="bg-slate-800 p-4 rounded-lg border border-slate-700">
                <h2 class="text-sm font-bold uppercase text-slate-500 mb-2">Local Keys</h2>
                <div id="localIdentity" class="text-xs break-all font-mono text-green-400">No active identity</div>
            </div>
        </div>

        <div class="col-span-8 bg-slate-800 rounded-lg border border-slate-700 flex flex-col h-[600px]">
            <div class="p-4 border-b border-slate-700 flex justify-between">
                <h2 class="font-bold">2. Secure Messaging</h2>
                <input id="recipientInput" type="text" placeholder="Recipient Alias" class="bg-slate-900 px-2 py-1 rounded border border-slate-600 text-sm">
            </div>
            
            <div id="messageDisplay" class="flex-grow p-4 overflow-y-auto space-y-2 font-mono text-sm">
                </div>

            <div class="p-4 border-t border-slate-700 flex gap-2">
                <input id="msgInput" type="text" placeholder="Type encrypted message..." class="flex-grow bg-slate-900 p-2 rounded border border-slate-600">
                <button onclick="sendMessage()" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded font-bold">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000";
        let currentUser = { alias: null, keyPair: null, token: null };

        async function handleAuth() {
            const alias = document.getElementById('aliasInput').value;
            if (!alias) {
                updateStatus("Error: Alias cannot be empty.", true);
                return;
            }
            updateStatus("Generating keys...");
            
            try {
                // 1. Generate RSA Keys (v0.3 requirement)
                const keyPair = await window.crypto.subtle.generateKey(
                    { name: "RSASSA-PKCS1-v1_5", modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: "SHA-256" },
                    true, ["sign", "verify"]
                );

                // 2. Register Challenge
                updateStatus("Requesting challenge...");
                const chalReq = await fetch(`${API_BASE}/auth/register-challenge`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ alias })
                });
                if (!chalReq.ok) {
                    throw new Error(`Challenge request failed: ${chalReq.status} ${chalReq.statusText}`);
                }
                const { nonce } = await chalReq.json();
                if (!nonce) {
                    throw new Error("Nonce not received from challenge request.");
                }

                // 3. Sign Challenge
                const signature = await window.crypto.subtle.sign("RSASSA-PKCS1-v1_5", keyPair.privateKey, new TextEncoder().encode(nonce));
                const signedNonce = btoa(String.fromCharCode(...new Uint8Array(signature)));

                // 4. Complete Registration (Sending Public Key)
                const pubKeyExport = await window.crypto.subtle.exportKey("spki", keyPair.publicKey);
                const spkiDerB64 = btoa(String.fromCharCode(...new Uint8Array(pubKeyExport)));
                const publicKeyPem = `-----BEGIN PUBLIC KEY-----\n${spkiDerB64.match(/.{1,64}/g).join('\n')}\n-----END PUBLIC KEY-----`;

                const regComplete = await fetch(`${API_BASE}/auth/register-complete`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ alias, publicKey: publicKeyPem, signedNonce })
                });

                if (!regComplete.ok) {
                    throw new Error(`Registration completion failed: ${regComplete.status} ${regComplete.statusText}`);
                }
                
                updateStatus("Registered! Logging in...");
                await login(alias, keyPair);
            } catch (error) {
                console.error("Auth process error:", error);
                updateStatus(`Error during authentication: ${error.message}`, true);
            }
        }

        async function login(alias, keyPair) {
            try {
                // 1. Login Challenge
                updateStatus("Requesting login challenge...");
                const loginChal = await fetch(`${API_BASE}/auth/login-challenge`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ alias })
                });
                if (!loginChal.ok) {
                    throw new Error(`Login challenge failed: ${loginChal.status} ${loginChal.statusText}`);
                }
                const { challenge } = await loginChal.json();
                if (!challenge) {
                    throw new Error("Challenge not received from login request.");
                }

                // 2. Sign Challenge
                const sig = await window.crypto.subtle.sign("RSASSA-PKCS1-v1_5", keyPair.privateKey, new TextEncoder().encode(challenge));
                const signedChallenge = btoa(String.fromCharCode(...new Uint8Array(sig)));

                // 3. Complete Login
                const loginDone = await fetch(`${API_BASE}/auth/login-complete`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ alias, signedChallenge })
                });
                if (!loginDone.ok) {
                    throw new Error(`Login completion failed: ${loginDone.status} ${loginDone.statusText}`);
                }
                const { token } = await loginDone.json();
                if (!token) {
                    throw new Error("Token not received after login completion.");
                }

                currentUser = { alias, keyPair, token };
                
                document.getElementById('localIdentity').innerText = `Logged in as: ${alias}\nJWT: ${token.substring(0, 20)}...`;
                updateStatus("Ready.");
                startPolling();
            } catch (error) {
                console.error("Login process error:", error);
                updateStatus(`Error during login: ${error.message}`, true);
                // Clear current user on login failure to prevent partial state
                currentUser = { alias: null, keyPair: null, token: null };
                document.getElementById('localIdentity').innerText = "No active identity";
            }
        }

        async function sendMessage() {
            const recipientAlias = document.getElementById('recipientInput').value;
            const text = document.getElementById('msgInput').value;
            if (!currentUser.token) {
                updateStatus("Error: Not logged in. Please initialize identity.", true);
                return;
            }
            if (!recipientAlias) {
                updateStatus("Error: Recipient alias cannot be empty.", true);
                return;
            }
            if (!text) {
                updateStatus("Error: Message cannot be empty.", true);
                return;
            }

            try {
                // 1. Get Recipient Public Key
                updateStatus("Fetching recipient public key...");
                const keyRes = await fetch(`${API_BASE}/keys/${recipientAlias}`, {
                    headers: { 'Authorization': `Bearer ${currentUser.token}` }
                });
                if (!keyRes.ok) {
                    throw new Error(`Failed to get recipient public key: ${keyRes.status} ${keyRes.statusText}`);
                }
                const { publicKey: recipientPubKeyStr } = await keyRes.json();
                if (!recipientPubKeyStr) {
                    throw new Error("Recipient public key not found.");
                }

                // 2. Create AES Key and Encrypt (Simplified for v0.3 UI demo)
                updateStatus("Encrypting message...");
                const aesKey = await window.crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt"]);
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const encrypted = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv }, aesKey, new TextEncoder().encode(text));
                
                const blob = new Uint8Array(iv.length + encrypted.byteLength);
                blob.set(iv, 0); blob.set(new Uint8Array(encrypted), 12);
                const encryptedMessage = btoa(String.fromCharCode(...blob));

                // 3. RSA Sign the encrypted string
                updateStatus("Signing message...");
                const sig = await window.crypto.subtle.sign("RSASSA-PKCS1-v1_5", currentUser.keyPair.privateKey, new TextEncoder().encode(encryptedMessage));
                const signature = btoa(String.fromCharCode(...new Uint8Array(sig)));

                // 4. POST to server
                updateStatus("Sending message...");
                const sendMsgRes = await fetch(`${API_BASE}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentUser.token}` },
                    body: JSON.stringify({ recipientAlias, type: "TEXT", encryptedMessage, signature })
                });
                if (!sendMsgRes.ok) {
                    throw new Error(`Failed to send message: ${sendMsgRes.status} ${sendMsgRes.statusText}`);
                }

                appendMsg("You", text, true);
                document.getElementById('msgInput').value = '';
                updateStatus("Message sent successfully.");
            } catch (error) {
                console.error("Send message error:", error);
                updateStatus(`Error sending message: ${error.message}`, true);
            }
        }

        function startPolling() {
            // Clear any existing interval to prevent multiple polling loops
            if (window.pollingInterval) {
                clearInterval(window.pollingInterval);
            }

            window.pollingInterval = setInterval(async () => {
                if (!currentUser.token) {
                    // Stop polling if user is no longer logged in
                    clearInterval(window.pollingInterval);
                    updateStatus("Polling stopped: Not logged in.", true);
                    return;
                }
                try {
                    const res = await fetch(`${API_BASE}/messages`, {
                        headers: { 'Authorization': `Bearer ${currentUser.token}` }
                    });
                    if (!res.ok) {
                        throw new Error(`Failed to fetch messages: ${res.status} ${res.statusText}`);
                    }
                    const msgs = await res.json();
                    if (!Array.isArray(msgs)) {
                        throw new Error("Invalid message format received from server.");
                    }
                    msgs.forEach(m => appendMsg(m.senderAlias, "[Encrypted Content Received]", false));
                } catch (error) {
                    console.error("Polling error:", error);
                    updateStatus(`Polling error: ${error.message}`, true);
                    // Optionally, stop polling after a certain number of errors or if it's an authorization error
                    // clearInterval(window.pollingInterval); 
                }
            }, 5000);
        }

        function updateStatus(msg, isError = false) {
            const statusElement = document.getElementById('status');
            statusElement.innerText = msg;
            if (isError) {
                statusElement.className = 'mt-2 text-xs text-red-400';
            } else {
                statusElement.className = 'mt-2 text-xs text-slate-400';
            }
        }
        
        function appendMsg(who, text, isMe) {
            const div = document.createElement('div');
            div.className = isMe ? "text-right" : "text-left";
            div.innerHTML = `<span class="text-xs text-slate-500">${who}</span><br><span class="bg-slate-700 px-3 py-1 rounded inline-block">${text}</span>`;
            document.getElementById('messageDisplay').appendChild(div);
        }
    </script>
</body>
</html>
