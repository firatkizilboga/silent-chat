<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SilentChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
</head>

<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="login-card glass">
                <div class="logo">
                    <div class="logo-icon">🔐</div>
                    <h1>SilentChat</h1>
                    <p class="tagline">End-to-End Encrypted Messaging</p>
                </div>
                <form id="loginForm" class="login-form">
                    <div class="input-group">
                        <input type="text" id="aliasInput" placeholder="Enter your alias" autocomplete="username"
                            required>
                        <span class="input-icon">@</span>
                    </div>
                    <button type="button" id="loginBtn" class="btn btn-primary">
                        <span class="btn-text">Connect</span>
                        <span class="btn-loader hidden"></span>
                    </button>
                </form>
                <p id="loginStatus" class="status-message"></p>
            </div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2>Chats</h2>
                <button id="closeSidebarBtn" class="icon-btn mobile-only">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="chatList" class="chat-list"></div>
            <div class="new-chat-box">
                <input type="text" id="newChatInput" placeholder="+ Start new chat...">
            </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <span class="user-avatar">👤</span>
                    <span id="currentUserAlias">-</span>
                </div>
                <button id="logoutBtn" class="icon-btn" title="Logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <button id="menuBtn" class="icon-btn mobile-only">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
                <div class="chat-title">
                    <h3 id="chatPeerName">Select a chat</h3>
                    <span id="chatStatus" class="chat-status"></span>
                </div>
                <div class="header-actions">
                    <span id="connectionIndicator" class="connection-indicator" title="Connected">●</span>
                </div>
            </header>

            <div id="messagesContainer" class="messages-container">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">💬</div>
                    <p>Select a chat or start a new one</p>
                </div>
            </div>

            <div class="input-area">
                <form id="messageForm" class="message-form">
                    <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.txt"
                        style="display: none;">
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
                    <button type="button" id="cameraBtn" class="btn btn-attach" disabled title="Take photo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                            <circle cx="12" cy="13" r="4" />
                        </svg>
                    </button>
                    <button type="button" id="attachBtn" class="btn btn-attach" disabled title="Attach file">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                        </svg>
                    </button>
                    <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" disabled>
                    <button type="submit" id="sendBtn" class="btn btn-send" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Webcam Modal -->
    <div id="webcamModal" class="modal hidden">
        <div class="modal-content webcam-modal">
            <div class="modal-header">
                <h3>📷 Take Photo</h3>
                <button id="closeWebcamBtn" class="icon-btn" title="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="webcam-container">
                <video id="webcamVideo" autoplay playsinline></video>
                <canvas id="webcamCanvas" style="display: none;"></canvas>
            </div>
            <div class="modal-actions">
                <button id="captureBtn" class="btn btn-primary">📸 Capture</button>
                <button id="switchCameraBtn" class="btn btn-secondary">🔄 Switch Camera</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
